paths:
  /v1/reports/contacts-report:
    get:
      summary: Get aggregated contact statistics (v1)
      description: |
        Returns total contacts, contacts added today, and email domain breakdown.
        **ADMIN only** - returns 403 for USER role.
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contact statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                data:
                  total: 142
                  addedToday: 5
                  mostCommonDomain: "gmail.com"
                  domainBreakdown:
                    - domain: "gmail.com"
                      count: 48
                      percentage: 33.8
                    - domain: "yahoo.com"
                      count: 22
                      percentage: 15.5
                  generatedAt: "2024-01-15T10:00:00.000Z"
                meta:
                  timestamp: "2024-01-15T10:00:00.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v2/reports/contacts-report:
    get:
      summary: Get aggregated contact statistics (v2)
      description: |
        Identical response shape to v1 - only the URL path differs.
        **ADMIN only** - returns 403 for USER role.
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contact statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                data:
                  total: 142
                  addedToday: 5
                  mostCommonDomain: "gmail.com"
                  domainBreakdown:
                    - domain: "gmail.com"
                      count: 48
                      percentage: 33.8
                  generatedAt: "2024-01-15T10:00:00.000Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'